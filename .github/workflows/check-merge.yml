name: Check Merge Consistency

on:
  push:
  pull_request:

jobs:
  check-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Run checkMerge
        run: npm run checkMerge