name: Build Docs

on:
  push:
  pull_request:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run buildDocs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: docs/*
          if-no-files-found: error
